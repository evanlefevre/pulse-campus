{{- /*
  Service STABLE du Rollout canary (étape 5).
  Argo Rollouts y ajoute dynamiquement le sélecteur rollouts-pod-template-hash
  de la version stable pour router le trafic "normal". L'ingress pointe dessus.
  Rendu uniquement en mode Rollout (useDeployment=false).
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "annuaire.fullname" . }}-stable
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "annuaire.selectorLabels" . | nindent 4 }}
{{- end }}
