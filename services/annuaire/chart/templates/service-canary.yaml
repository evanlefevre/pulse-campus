{{- /*
  Service CANARY du Rollout (étape 5).
  Argo Rollouts y injecte le sélecteur rollouts-pod-template-hash de la NOUVELLE
  version. Le contrôleur dérive l'ingress canary à partir de l'ingress stable et
  le fait pointer ici. Rendu uniquement en mode Rollout (useDeployment=false).
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "annuaire.fullname" . }}-canary
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "annuaire.selectorLabels" . | nindent 4 }}
{{- end }}
