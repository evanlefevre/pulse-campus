{{- /*
  Service PREVIEW du Rollout blue/green (étape 8).
  Pointe sur la NOUVELLE version dès son déploiement, AVANT bascule. Permet de
  la tester (curl planning-preview.devhub.local) sans impacter les utilisateurs.
  Rendu uniquement en mode Rollout (useDeployment=false).
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "planning.fullname" . }}-preview
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "planning.selectorLabels" . | nindent 4 }}
{{- end }}
