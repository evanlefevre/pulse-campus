{{- /*
  ServiceMonitor de planning (étape 4). Sélectionne le Service générique
  (tous les pods : active + preview). Label release:kps obligatoire.
  Relabelings : rollouts_pod_template_hash (distinguer preview/active) + app.
*/ -}}
{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
    release: {{ .Values.monitoring.serviceMonitor.release | quote }}
spec:
  selector:
    matchLabels:
      {{- include "planning.selectorLabels" . | nindent 6 }}
      # release distingue le Service générique des Services active/preview qui
      # partagent les mêmes selectorLabels (sinon scraping en triple).
      release: {{ .Values.monitoring.serviceMonitor.release | quote }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_rollouts_pod_template_hash]
          targetLabel: rollouts_pod_template_hash
        - sourceLabels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
          targetLabel: app
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
{{- end }}
