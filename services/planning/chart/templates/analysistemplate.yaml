{{- /*
  AnalysisTemplate de PRÉ-PROMOTION pour le blue/green (étape 8).
  Vérifie la PREVIEW (nouvelle version) pendant 2 min avant d'autoriser la
  bascule de l'activeService. Mêmes deux signaux qu'en canary (5xx, p95), mais
  filtrés sur le hash de la version preview.
  Protection Helm des `{{args.preview-hash}}` par backtick raw string.
*/ -}}
{{- if .Values.rollout.analysis.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "planning.fullname" . }}-prepromo
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  args:
    - name: preview-hash
  metrics:
    - name: error-rate
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      successCondition: "result[0] <= {{ .Values.rollout.analysis.errorRateThreshold }}"
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc.cluster.local:9090
          query: |
            (sum(rate(http_requests_total{app="{{ include "planning.name" . }}", namespace="{{ .Release.Namespace }}", rollouts_pod_template_hash="{{ `{{args.preview-hash}}` }}", status_class="5xx"}[1m])) or vector(0))
            /
            clamp_min(sum(rate(http_requests_total{app="{{ include "planning.name" . }}", namespace="{{ .Release.Namespace }}", rollouts_pod_template_hash="{{ `{{args.preview-hash}}` }}"}[1m])), 1)
    - name: latency-p95
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      successCondition: "result[0] <= {{ .Values.rollout.analysis.latencyP95Threshold }}"
      provider:
        prometheus:
          address: http://prometheus-operated.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{app="{{ include "planning.name" . }}", namespace="{{ .Release.Namespace }}", rollouts_pod_template_hash="{{ `{{args.preview-hash}}` }}"}[2m])) by (le)
            ) or vector(0)
{{- end }}
