{{- /*
  Service ACTIF du Rollout blue/green (étape 8).
  Reçoit le trafic utilisateur. Argo Rollouts y injecte le sélecteur
  rollouts-pod-template-hash de la version active. L'ingress principal pointe ici.
  Rendu uniquement en mode Rollout (useDeployment=false).
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "planning.fullname" . }}-active
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "planning.selectorLabels" . | nindent 4 }}
{{- end }}
