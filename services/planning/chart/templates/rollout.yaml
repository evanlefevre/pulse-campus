{{- /*
  Rollout BLUE/GREEN de planning (étape 8).
  Les deux versions tournent à pleine capacité simultanément :
    - activeService  : reçoit le trafic utilisateur (ancienne version) ;
    - previewService : pointe sur la NOUVELLE version, testée avant bascule.
  La bascule (active -> nouvelle) est manuelle (autoPromotionEnabled:false),
  puis sécurisée par un prePromotionAnalysis (2 min de vérif preview).
  L'ancienne version est conservée scaleDownDelaySeconds (5 min) après bascule.
  Rendu uniquement en mode Rollout (useDeployment=false).
*/ -}}
{{- if not .Values.useDeployment }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
  annotations:
    notifications.argoproj.io/subscribe.on-rollout-completed.success: ""
    notifications.argoproj.io/subscribe.on-rollout-aborted.failure: ""
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.rollout.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "planning.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "planning.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: planning
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              # protocol explicite : sans lui le diff ServerSideApply d'ArgoCD
              # échoue (la liste associative ports exige la clé protocol).
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: METRICS_BUCKETS
              value: {{ .Values.metrics.buckets | quote }}
            - name: METRICS_BUSINESS_ENABLED
              value: {{ .Values.metrics.businessEnabled | quote }}
            - name: VERSION
              value: {{ .Chart.AppVersion | quote }}
            - name: COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: FAIL_RATE
              value: {{ .Values.env.FAIL_RATE | default "0" | quote }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
  strategy:
    blueGreen:
      activeService: {{ include "planning.fullname" . }}-active
      previewService: {{ include "planning.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.rollout.blueGreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ .Values.rollout.blueGreen.scaleDownDelaySeconds }}
      {{- if .Values.rollout.analysis.enabled }}
      prePromotionAnalysis:
        templates:
          - templateName: {{ include "planning.fullname" . }}-prepromo
        args:
          # Hash du ReplicaSet preview (la nouvelle version) à vérifier.
          - name: preview-hash
            valueFrom:
              podTemplateHashValue: Latest
      {{- end }}
{{- end }}
