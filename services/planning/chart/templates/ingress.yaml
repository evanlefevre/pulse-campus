{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "planning.fullname" . }}
  labels:
    {{- include "planning.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                # En blue/green, l'ingress utilisateur pointe sur le Service ACTIF.
                name: {{ include "planning.fullname" . }}{{ if not .Values.useDeployment }}-active{{ end }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
