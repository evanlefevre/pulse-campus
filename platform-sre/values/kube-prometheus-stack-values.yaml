# Values du chart kube-prometheus-stack pour le TP 3.
# Référence : https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Ce fichier est volontairement minimaliste. Tweakez-le étape 3.

fullnameOverride: kps

# ---- Grafana ----
grafana:
  enabled: true
  # Mot de passe admin SORTI DE GIT (étape 3) : on référence un Secret créé
  # hors-Git (cf. platform-sre/secrets/grafana-admin.example.yaml) ou un
  # SealedSecret. Plus aucun mot de passe en clair dans ce fichier.
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsTimezone: browser
  ingress:
    enabled: true
    ingressClassName: nginx
    # TODO : alignez avec l'entrée que vous mettrez dans /etc/hosts.
    hosts:
      - grafana.devhub.local
    path: /
  # Auto-discovery des dashboards posés en ConfigMap avec le label `grafana_dashboard=1`.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

# ---- Prometheus ----
prometheus:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: nginx
    # TODO : alignez avec l'entrée que vous mettrez dans /etc/hosts.
    hosts:
      - prometheus.devhub.local
    paths:
      - /
  prometheusSpec:
    # Rétention courte pour le TP — adaptez si vous gardez le cluster longtemps.
    retention: 15d
    # En kind 2 nœuds, EmptyDir est suffisant. En prod : PVC.
    # TODO étape 3 (défi) : passez en PersistentVolumeClaim.
    storageSpec: {}
    # Sélectionne TOUS les ServiceMonitor portant le label `release: kps`,
    # quel que soit leur namespace. C'est l'option la plus permissive,
    # utile en TP.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector:
      matchLabels:
        release: kps
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        release: kps

# ---- Alertmanager ----
alertmanager:
  enabled: true
  # Configuration Alertmanager (étape 10).
  # Gradation volontaire : severity=page -> webhook primaire (réveille),
  # severity=ticket -> webhook secondaire (attend lundi).
  # Remplacez les URLs par vos endpoints https://webhook.site/<token>.
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "default"
      group_by: ["alertname", "service", "severity"]
      group_wait: 30s
      group_interval: 5m
      # repeat_interval explicite pour ne pas spammer une alerte qui reste firing.
      repeat_interval: 4h
      routes:
        # Ce qui réveille à 3h du matin.
        - matchers:
            - 'severity = "page"'
          receiver: "page-webhook"
          group_wait: 10s
          repeat_interval: 1h
        # Ce qui peut attendre lundi.
        - matchers:
            - 'severity = "ticket"'
          receiver: "ticket-webhook"
          repeat_interval: 12h
    receivers:
      - name: "default"
      - name: "page-webhook"
        webhook_configs:
          - url: "https://webhook.site/b256a22f-a3f6-4293-8941-dbf9990a1265"
            send_resolved: true
      - name: "ticket-webhook"
        webhook_configs:
          - url: "https://webhook.site/0511dcf8-5320-42fb-a76c-ebc2f6d67ab3"
            send_resolved: true
    # Si on "page", inutile d'ouvrir aussi un "ticket" pour le même service.
    inhibit_rules:
      - source_matchers: ['severity = "page"']
        target_matchers: ['severity = "ticket"']
        equal: ["service", "alertname"]

# ---- Sous-charts à désactiver sur kind ----
# Kind ne fournit pas les endpoints standards de la control plane.
# Laissez à false sinon Prometheus aura des cibles DOWN en permanence.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

# ---- Operator ----
prometheusOperator:
  admissionWebhooks:
    # En cluster local kind, l'auto-patch peut bloquer ; on simplifie.
    patch:
      enabled: false
    enabled: false
  # TLS de l'operator désactivé : sinon il monte un secret `kps-admission`
  # (jamais créé car les webhooks sont off) et reste en ContainerCreating.
  tls:
    enabled: false
