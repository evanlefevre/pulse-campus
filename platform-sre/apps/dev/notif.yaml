# Application ArgoCD : notif-dev
#
# Déploie le chart Helm de services/notif/chart dans le namespace devhub-dev.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notif-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    # TODO : URL de votre fork.
    repoURL: https://github.com/evanlefevre/pulse-campus.git
    targetRevision: main
    path: services/notif/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    automated:
      # prune non spécifié = false (défaut). L'expliciter crée un écart permanent
      # (ArgoCD l'omet de l'objet live → root OutOfSync).
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
