# EXEMPLE de Secret pour le mot de passe admin Grafana (étape 3).
#
# NE COMMITEZ PAS la version réelle. Deux options :
#
#   1) Hors-Git (TP) : copiez ce fichier en grafana-admin.yaml, mettez un vrai
#      mot de passe, appliquez-le À LA MAIN dans le namespace monitoring :
#
#        kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
#        kubectl -n monitoring create secret generic grafana-admin \
#          --from-literal=admin-user=admin \
#          --from-literal=admin-password='UnMotDePasseFort!'
#
#      Le fichier values référence ce Secret via grafana.admin.existingSecret.
#
#   2) GitOps propre (défi bonus) : chiffrez-le en SealedSecret (kubeseal) et
#      commitez le SealedSecret. Documentez la rotation dans le RAPPORT.
#
# Le secret DOIT vivre dans le namespace `monitoring` et s'appeler `grafana-admin`.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  # Remplacez avant utilisation. Ne laissez JAMAIS cette valeur.
  admin-password: "REMPLACEZ-MOI"
