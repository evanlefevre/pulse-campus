{{- /*
  Un ConfigMap par fichier *.json du dossier dashboards/. Le label
  grafana_dashboard=1 déclenche l'import automatique par le sidecar Grafana.
  Le dashboard reste donc commité en JSON (source de vérité GitOps) ; aucun
  clic d'import manuel à refaire après un redéploiement de Grafana.
*/ -}}
{{- range $path, $_ := .Files.Glob "*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-{{ $name }}
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: devhub-campus
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
---
{{- end }}
